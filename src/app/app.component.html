<main class="h-screen flex flex-col">

 @if (loading()) {

  <h2>Cargando...</h2>

  } @else {
   <div class="flex flex-col h-full">

    <topbar-component class="sticky top-0 z-10"/>
    
    <div class="flex flex-row flex-1 overflow-hidden">
      <sidebar-component class="sticky top-0 h-full overflow-y-visible"/>
      
      <div class="flex-1 overflow-y-auto dark:bg-gray-800 dark:border-black/0
       dark:text-white p-4 xl:px-16 xl:py-8 w-full scrollbar-hidden">
        <router-outlet />
      </div>

    </div>
  </div>

 }

</main>
