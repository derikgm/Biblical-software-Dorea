<div class="flex flex-col w-full h-full">

    <div class="w-full flex flex-row border-b-cyan-700 dark:border-b-cyan-300 
     border-b-2">
        <div class="px-1 flex items-center">
            <div class="w-3 h-3 rounded-full"
            [class.to-save]="show_ready_to_save()"></div>
        </div>
        <input type="text" #header
        class="font-bold text-xl mb-1 text-cyan-700 outline outline-0 w-full
         dark:bg-gray-800 dark:text-cyan-300 " 
        (keypress)="jump_to_textarea($event)"
        [value]="notes_services.current_header()" />
    </div>

    <textarea 
    #text_area
    class="w-full h-full flex text-black dark:bg-gray-800 scrollbar-hidden resize-none 
    outline outline-0 dark:text-white"
    (input)="text_area_handler()"
    [value]="notes_services.current_content()"
    [placeholder]="lang.data()?.notes?.file_empty"
    >

    </textarea>

</div>

<style>
    .to-save {
        @apply dark:bg-white bg-black;
    }

</style>
