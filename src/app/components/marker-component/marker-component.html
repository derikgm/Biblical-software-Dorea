    <div 
        class="w-44 h-12 dark-bg light-bg rounded border-2 justify-around
        shadow-md flex items-center absolute"
        [style.z-index]="10"
        [style.top.px]="yPosition() - 50"
        [style.left.px]="xPosition() - 50"
    >
        <div (click)="this.colorMark.emit(0)"
        class="cursor-pointer w-6 h-6 bg-red-700 rounded-full border border-gray-500"></div>
        <div (click)="this.colorMark.emit(1)"
        class="cursor-pointer w-6 h-6 bg-blue-700 rounded-full border border-gray-500"></div>
        <div (click)="this.colorMark.emit(2)"
        class="cursor-pointer w-6 h-6 bg-green-700 rounded-full border border-gray-500"></div>
        <div (click)="this.colorMark.emit(3)"
        class="cursor-pointer w-6 h-6 bg-violet-700 rounded-full border border-gray-500"></div>
        <div (click)="this.colorMark.emit(4)"
        class="cursor-pointer w-6 h-6 rounded-full border border-black items-center justify-center flex">
            <ng-icon name="cruz"></ng-icon>
        </div>
        
    </div>
